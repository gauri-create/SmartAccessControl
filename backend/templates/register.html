<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SentriCore | Register Personnel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">

    <div class="login-container">
        <div class="login-header">
            <img src="{{ url_for('static', filename='sentricore_logo.jpg') }}" alt="Logo" class="small-logo">
            <h2>Personnel Registration</h2>
            <p>Enroll new identity into the secure database.</p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="auth-form">
            
            <div class="input-group">
                <label class="form-label">System Username</label>
                <input name="username" placeholder="e.g. jdoe24" required autocomplete="off">
            </div>

            <div class="input-group">
                <label class="form-label">Full Legal Name</label>
                <input name="name" placeholder="e.g. John Doe" required>
            </div>

            <div class="input-group">
                <label class="form-label">Enrollment Photo (Face)</label>
                <input type="file" name="face_image" accept="image/*" class="file-input" required>
                <small style="color: #666; font-size: 0.8rem;">Ensure face is clear and centered.</small>
            </div>

            <div class="input-group">
                <label class="form-label">Temporary Password</label>
                <input name="password" type="password" placeholder="••••••••" required>
            </div>

            <div class="input-group">
                <label class="form-label">Assigned Role</label>
                <select name="role" class="styled-select" required>
                    <option value="" disabled selected>Select Access Level...</option>
                    <option value="employee">Employee (General Access)</option>
                    <option value="security">Security (Logs & Monitoring)</option>
                    <option value="hr">HR (Personnel Management)</option>
                    <option value="owner">Owner (Full System Control)</option>
                </select>
            </div>

            <button type="submit" class="btn-primary full-width">Create Identity</button>
            
            <div class="login-footer">
                <a href="/hr" class="back-link">← Cancel and Exit</a>
            </div>
        </form>
    </div>

</body>
</html>
