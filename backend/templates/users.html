<link rel="stylesheet" href="/static/style.css">

<div class="container">
<h2>User Control</h2>

<table>
<tr>
<th>User</th>
<th>Role</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for u in users %}
<tr>
<td>{{ u.username }}</td>
<td>{{ u.role }}</td>
<td>{{ u.status }}</td>
<td>
<a href="/toggle/{{ u.id }}">
<button>Toggle</button>
</a>
</td>
</tr>
{% endfor %}

</table>
</div>
