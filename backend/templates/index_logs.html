<!DOCTYPE html>
<html>
<head>
    <title>Logs</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>Security Logs</h2>

<table>
<tr>
<th>Name</th>
<th>Status</th>
<th>Time</th>
<th>Image</th>
</tr>

{% for log in logs %}
<tr>
<td>{{ log.name }}</td>
<td>{{ log.status }}</td>
<td>{{ log.timestamp }}</td>
<td>
{% if log.image %}
<img src="/{{ log.image }}" width="80">
{% endif %}
</td>
</tr>
{% endfor %}

</table>

</body>
</html>
